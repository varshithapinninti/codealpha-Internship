<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>
    <h1>Image Gallery</h1>

<h2><i>Elegant Jewellery Collection</i></h2>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
   

    <div>
        <button class="btn btn-primary filter-btn" onclick="filterImages('all')">All</button>
        <button class="btn btn-success filter-btn" onclick="filterImages('neckpieces')">Neck Pieces</button>
        <button class="btn btn-warning filter-btn" onclick="filterImages('earrings')">Ear Rings</button>
    </div>

    <div class="gallery">
        <img src="image1.jpg" class="gallery-img neckpieces">
    <img src="image2.jpg" class="gallery-img neckpieces">
    <img src="image3.jpg" class="gallery-img neckpieces">
    <img src="image5.jpg" class="gallery-img neckpieces">
    <img src="image7.jpg" class="gallery-img earrings">
    <img src="image4.jpg" class="gallery-img earrings">
    <img src="image6.jpg" class="gallery-img earrings">
    <img src="image8.jpg" class="gallery-img earrings">
    </div>

    <div id="lightbox">
        <span class="close-btn">&times;</span>
        <button id="prev" class="nav-btn btn btn-primary"></button>
        <img id="lightbox-img">
        <button id="next" class="nav-btn btn btn-primary"></button>
    </div>

    <script src="script.js"></script>

</body>
</html>
